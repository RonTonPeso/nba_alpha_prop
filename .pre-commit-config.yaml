# Local hooks run the tools from backend's uv venv so mypy sees real
# project deps. Requires pre-commit installed: `uvx pre-commit install`.
repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run --directory backend ruff check --fix
        language: system
        types: [python]
        files: ^backend/
        pass_filenames: false
      - id: black
        name: black
        entry: uv run --directory backend black
        language: system
        types: [python]
        files: ^backend/
        pass_filenames: false
        args: [app, tests]
      - id: mypy
        name: mypy
        entry: uv run --directory backend mypy
        language: system
        types: [python]
        files: ^backend/
        pass_filenames: false
        args: [app, tests]
